<!DOCTYPE html>
<!-- Banco de preguntas -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Banco Residencia Clínica Médica</title>

<link rel="stylesheet" href="css/estilos.css">

</head>
<body>

<div class="container">

    <h1>Banco de Preguntas Residencia Clínica Médica</h1>

    <div class="top-bar">

        <div>
            Pregunta:
            <span id="numeroPregunta">1</span>
            /
            <span id="totalPreguntas">0</span>
        </div>

        <div>
            Correctas:
            <span id="correctas">0</span>
        </div>

        <label class="theme-toggle" for="toggleTema">
            <span>Modo oscuro</span>
            <input type="checkbox" id="toggleTema">
        </label>

    </div>

    <div id="tema"></div>

    <div id="pregunta"></div>

    <div id="opciones"></div>

    <div id="feedback"></div>

    <button id="btnSiguiente">
        Siguiente
    </button>

</div>

<script src="js/preguntas001_100.js"></script>
<script src="js/preguntas101_200.js"></script>
<script src="js/preguntas201_300.js"></script>
<script src="js/preguntas301_400.js"></script>
<script src="js/preguntas401_500.js"></script>
<script src="js/preguntas501_600.js"></script>
<script src="js/preguntas601_700.js"></script>
<script src="js/preguntas701_800.js"></script>
<script src="js/preguntas801_900.js"></script>
<script src="js/preguntas901_1000.js"></script>

<script src="js/app.js"></script>

</body>
</html>
